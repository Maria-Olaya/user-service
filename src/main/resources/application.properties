# ==============================
# APP
# ==============================
spring.application.name=user-service
server.port=8081

# ==============================
# PostgreSQL
# ==============================
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/groupchatdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:groupchat2024}

# ==============================
# JPA / Hibernate
# ==============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.properties.hibernate.default_schema=users
spring.jpa.show-sql=false

# ==============================
# JWT
# ==============================
jwt.secret=${JWT_SECRET:gruopChat-secret-key-2026-eafit-telematica-st0263}
jwt.expiration-ms=86400000

# ==============================
# LOGS
# ==============================
logging.level.eafit.gruopChat=DEBUG
logging.level.org.springframework.security=WARN
management.endpoints.web.exposure.include=health,mappings
management.endpoint.mappings.enabled=true
management.security.enabled=false


grpc.server.port=9091
grpc.server.security.enabled=false